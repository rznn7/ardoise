<div
  class="relative flex h-full w-full max-w-[420px] flex-col overflow-hidden border-x border-border shadow-sm"
>
  @if (header()) {
    <header class="sticky top-0 z-10">
      <ng-content select="[appShellHeader]" />
    </header>
  }
  <main class="flex-1 overflow-y-auto overscroll-contain">
    <ng-content />
  </main>
  @if (fab()) {
    <div class="absolute right-0 bottom-0 z-10 p-4 pb-[calc(1rem+env(safe-area-inset-bottom))]">
      <ng-content select="[appShellFab]" />
    </div>
  }
</div>
