@let currentState = state();

@switch (currentState.state) {
  @case ('idle') {
    <button hlmBtn variant="outline" size="lg" (click)="login()">
      <ng-icon name="lucideKeyRound" />
      <span>Login with passkey</span>
    </button>
  }
  @case ('loading') {
    <button hlmBtn variant="outline" size="lg" [disabled]="true">
      <hlm-spinner class="text-base md:text-lg" />
      <span>Login in...</span>
    </button>
  }
  @case ('error') {
    <button hlmBtn variant="destructive" size="lg" (click)="login()">
      <span>{{ currentState.message }} Retry?</span>
    </button>
  }
}
